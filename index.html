function Clis({clis,setClis}){

    <div style={{display:"grid",gap:10}}>{fl.map(c=><div key={c.id} style={{background:CC.card,border:`1px solid ${CC.bo}`,borderRadius:12,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:CC.tx,fontWeight:700,fontSize:14}}>{c.nombre}</span><Bdg c={c.potencial} col={pc[c.potencial]}/></div>
      <div style={{color:CC.mu,fontSize:12,display:"flex",flexWrap:"wrap",gap:"4px 12px"}}><span>👤 {c.contacto}</span><span>📞 {c.tel}</span><span>📍 {c.ciudad}</span></div>
      <div style={{marginTop:8}}><a href={`tel:${c.tel}`} style={{background:CC.accs,color:CC.acc,borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:600,textDecoration:"none"}}>📞 Llamar</a></div>
    </div>)}</div>
  </div>);
}
function Prods({prods}){
  const[s,setS]=useState("");const[cat,setCat]=useState("Todos");
  const cats=["Todos",...new Set(prods.map(p=>p.categoria))];
  const fl=prods.filter(p=>(cat==="Todos"||p.categoria===cat)&&(p.nombre.toLowerCase().includes(s.toLowerCase())||p.ref.toLowerCase().includes(s.toLowerCase())));
  return(<div><h2 style={{color:CC.tx,fontSize:22,fontWeight:800,marginBottom:14}}>Catálogo</h2>
    <div style={{position:"relative",marginBottom:10}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}>🔍</span><input placeholder="Buscar..." value={s} onChange={e=>setS(e.target.value)} style={{...inp,paddingLeft:36}}/></div>
    <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4}}>{cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?CC.acc:CC.card,color:cat===c?"#000":CC.mu,border:`1px solid ${cat===c?CC.acc:CC.bo}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:cat===c?700:500,whiteSpace:"nowrap"}}>{c}</button>)}</div>
    <div style={{display:"grid",gap:10}}>{fl.map(p=><div key={p.id} style={{background:CC.card,border:`1px solid ${CC.bo}`,borderRadius:12,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><Bdg c={p.categoria} col="bl"/><Bdg c={p.stock?"En stock":"Sin stock"} col={p.stock?"gr":"rd"}/></div>
      <div style={{color:CC.tx,fontWeight:700,fontSize:14,marginBottom:4}}>{p.nombre}</div>
      <div style={{color:CC.mu,fontSize:12,marginBottom:10}}>🏷️ {p.ref} · 🏭 {p.marca}</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:CC.acc,fontSize:18,fontWeight:800}}>{p.precio.toFixed(2)}€</span><button style={{background:CC.bl,color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:600}}>+ Pedido</button></div>
    </div>)}</div>
  </div>);
}
function Peds({peds,setPeds,clis}){
  const[sf,setSf]=useState(false);const[f,setF]=useState({cliente:"",fecha:new Date().toISOString().split("T")[0],estado:"Pendiente",total:"",lineas:""});
  const add=()=>{if(!f.cliente||!f.total)return;setPeds([...peds,{...f,id:Date.now(),total:parseFloat(f.total),lineas:parseInt(f.lineas)||1}]);setF({cliente:"",fecha:new Date().toISOString().split("T")[0],estado:"Pendiente",total:"",lineas:""});setSf(false);};
  const ec={Confirmado:"bl",Pendiente:"am",Entregado:"gr",Cancelado:"rd"};
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{color:CC.tx,fontSize:22,fontWeight:800}}>Pedidos</h2><button onClick={()=>setSf(!sf)} style={{background:CC.acc,color:"#000",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>➕</button></div>
    {sf&&<div style={{background:CC.card,border:`1px solid ${CC.acc}40`,borderRadius:14,padding:16,marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <select value={f.cliente} onChange={e=>setF({...f,cliente:e.target.value})} style={inp}><option value="">-- Cliente --</option>{clis.map(c=><option key={c.id}>{c.nombre}</option>)}</select>
        <input type="date" value={f.fecha} onChange={e=>setF({...f,fecha:e.target.value})} style={inp}/>
        <input placeholder="Importe (€)" value={f.total} onChange={e=>setF({...f,total:e.target.value})} style={inp}/>
        <input placeholder="Nº líneas" value={f.lineas} onChange={e=>setF({...f,lineas:e.target.value})} style={inp}/>
      </div>
      <div style={{display:"flex",gap:8}}><button onClick={add} style={{background:CC.gr,color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>Guardar</button><button onClick={()=>setSf(false)} style={{background:CC.sur,color:CC.mu,border:`1px solid ${CC.bo}`,borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13}}>Cancelar</button></div>
    </div>}
    <div style={{display:"grid",gap:10}}>{peds.map(p=><div key={p.id} style={{background:CC.card,border:`1px solid ${CC.bo}`,borderRadius:12,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><div style={{color:CC.tx,fontWeight:700,fontSize:14}}>{p.cliente}</div><div style={{color:CC.mu,fontSize:12}}>{p.fecha} · {p.lineas} líneas</div></div>
        <div style={{textAlign:"right"}}><div style={{color:CC.acc,fontWeight:800,fontSize:16}}>{p.total.toFixed(2)}€</div><Bdg c={p.estado} col={ec[p.estado]}/></div>
      </div>
    </div>)}</div>
  </div>);
}
function AddVis({vis,setVis,clis,fechaInicial}){
  const[sf,setSf]=useState(false);const[f,setF]=useState({cliente:"",ciudad:"Madrid",fecha:fechaInicial,hora:"10:00",tipo:"Visita comercial",notas:""});
  const add=()=>{if(!f.cliente||!f.fecha)return;const c=coords[f.ciudad]||{lat:40.4168,lng:-3.7038};const d=vis.filter(v=>v.fecha===f.fecha);const mo=d.length>0?Math.max(...d.map(v=>v.orden)):0;setVis([...vis,{...f,...c,id:Date.now(),orden:mo+1}]);setF({cliente:"",ciudad:"Madrid",fecha:fechaInicial,hora:"10:00",tipo:"Visita comercial",notas:""});setSf(false);};
  return(<div style={{marginBottom:14}}>
    {!sf&&<button onClick={()=>setSf(true)} style={{background:CC.acc,color:"#000",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13,marginBottom:14}}>➕ Nueva visita</button>}
    {sf&&<div style={{background:CC.card,border:`1px solid ${CC.acc}40`,borderRadius:14,padding:16,marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <select value={f.cliente} onChange={e=>setF({...f,cliente:e.target.value})} style={inp}><option value="">-- Cliente --</option>{clis.map(c=><option key={c.id}>{c.nombre}</option>)}</select>
        <select value={f.ciudad} onChange={e=>setF({...f,ciudad:e.target.value})} style={inp}>{Object.keys(coords).map(c=><option key={c}>{c}</option>)}</select>
        <input type="date" value={f.fecha} onChange={e=>setF({...f,fecha:e.target.value})} style={inp}/>
        <input type="time" value={f.hora} onChange={e=>setF({...f,hora:e.target.value})} style={inp}/>
        <select value={f.tipo} onChange={e=>setF({...f,tipo:e.target.value})} style={inp}>{["Visita comercial","Seguimiento","Demostración","Cobro","Posventa"].map(t=><option key={t}>{t}</option>)}</select>
        <input placeholder="Notas..." value={f.notas} onChange={e=>setF({...f,notas:e.target.value})} style={inp}/>
      </div>
      <div style={{display:"flex",gap:8}}><button onClick={add} style={{background:CC.gr,color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>Guardar</button><button onClick={()=>setSf(false)} style={{background:CC.sur,color:CC.mu,border:`1px solid ${CC.bo}`,borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13}}>Cancelar</button></div>
    </div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
